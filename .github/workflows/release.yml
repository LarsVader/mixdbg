name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Publish MixDbg
        run: dotnet publish src/MixDbg.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Build Profiler DLL
        run: msbuild profiler/MixDbgProfiler.vcxproj -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143

      - name: Copy Profiler DLL to publish
        run: copy profiler\x64\Release\MixDbgProfiler.dll publish\

      - name: Create release archive
        run: Compress-Archive -Path publish\* -DestinationPath mixdbg-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mixdbg-win-x64.zip
          generate_release_notes: true
